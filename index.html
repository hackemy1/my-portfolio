<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Hello, I'm Emmanuel</h1>
            <p>Web Developer | Cybersecurity Learner | Freelancer</p>
            <button id="heroBtn">Hire Me</button>
        </div>
    </section>

    <!-- About Section -->
    <section class="about">
        <h2>About Me</h2>
        <p>
            I am passionate about Web Development, Cybersecurity,
            and AI. I enjoy building projects and learning new technologies.
        </p>
    </section>

    <!-- Contact Section -->
    <section class="contact">
        <h2>Contact Me</h2>

        <form id="contactForm">
            <input
                type="text"
                id="name"
                placeholder="Your Name"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Your Email"
                required
            >

            <textarea
                id="message"
                placeholder="Your Message"
                rows="5"
                required
            ></textarea>

            <button type="submit">Send Message</button>
        </form>

        <p id="successMessage"></p>
    </section>

    <script src="script.js"></script>
</body>
</html>
